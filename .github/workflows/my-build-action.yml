on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      args:
        required: false
        type: string
      minify:
        required: false
        type: boolean
      release:
        required: false
        type: boolean
      nightly_release:
        required: false
        type: boolean
    secrets:
      ANDROID_SIGNING_KEY:
        required: false
      ANDROID_KEY_ALIAS:
        required: false
      ANDROID_KEYSTORE_PASSWORD:
        required: false
      ANDROID_KEY_PASSWORD:
        required: false

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build Desktop App (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set Up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Change wrapper permissions
        shell: bash
        run: chmod +x ./gradlew

      - name: Set desktop artifact suffix
        id: desktop_suffix
        shell: bash
        run: |
          arch="$(uname -m)"
          case "$arch" in
            x86_64|amd64) arch="x64" ;;
            aarch64|arm64) arch="arm64" ;;
          esac
          case "$RUNNER_OS" in
            Linux) os="linux" ;;
            macOS) os="macos" ;;
            Windows) os="windows" ;;
            *) os="$(echo "$RUNNER_OS" | tr '[:upper:]' '[:lower:]')" ;;
          esac
          echo "suffix=$os-$arch" >> "$GITHUB_OUTPUT"

      - name: Build Desktop Jar
        shell: bash
        run: ./gradlew ${{ inputs.args }} :desktopApp:packageReleaseUberJarForCurrentOS

      - name: Move desktop jar
        shell: bash
        run: |
          mkdir -p desktopApp/build/upload
          mv desktopApp/build/compose/jars/*-release.jar desktopApp/build/upload/zhihu++-desktop-${{ steps.desktop_suffix.outputs.suffix }}.jar

      - name: Upload Desktop Jar
        uses: actions/upload-artifact@v4
        with:
          name: zhihu++-desktop-${{ steps.desktop_suffix.outputs.suffix }}
          path: desktopApp/build/upload/zhihu++-desktop-${{ steps.desktop_suffix.outputs.suffix }}.jar

  build:
    name: Build Android App
    needs: build-desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Set Current Date As Env Variable
      - name: Set current date as env variable
        run: echo "date_today=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      # Set Repository Name As Env Variable
      - name: Set repository name as env variable
        run: echo "repository_name=$(echo '${{ github.repository }}' | awk -F '/' '{print $2}')" >> $GITHUB_ENV

      - name: Set Up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu' # See 'Supported distributions' for available options
          java-version: '17'
          cache: 'gradle'
      - name: Setup rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          override: true

      - name: Install cargo-ndk
        run: cargo install cargo-ndk || true

      - name: Add Android Rust targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add x86_64-linux-android

      - name: Change wrapper permissions
        run: chmod +x ./gradlew
      - name: Cache Rust
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ./rs-hf-tokenizer/target/
          key: rust-cache-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            rust-cache-
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.m2/repository
            ./.gradle
            ./**/.gradle
          # dont invalidate cache if only gradle.properties is changed -- they
          key: gradle-cache-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          echo "y" | sdkmanager --install "ndk;29.0.14206865"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/29.0.14206865" >> $GITHUB_ENV
      # Run Tests Build
      - name: Run KtLint
        run: ./gradlew ktlintCheck
      #- name: Run gradle tests
      #  run: ./gradlew test
      - name: Build App
        # Build .apk
        run: |
          bash ./gradlew ${{inputs.args}} assembleFullRelease
          bash ./gradlew ${{inputs.args}} assembleLiteRelease
        env:
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
          CI_BUILD_MINIFY: ${{ inputs.minify }}
      - name: Move files
        run: |
          mkdir -p app/build/upload
          mv app/build/outputs/apk/full/release/app-full-release.apk app/build/upload/zhihu++-full.apk
          mv app/build/outputs/apk/lite/release/app-lite-release.apk app/build/upload/zhihu++-lite.apk
      - name: Download desktop jars
        uses: actions/download-artifact@v4
        with:
          pattern: zhihu++-desktop-*
          path: app/build/upload
          merge-multiple: true
      - name: Compress lite mapping file
        if: ${{ inputs.minify }}
        run: |
          mkdir -p app/build/upload
          zip app/build/upload/mapping-lite.zip app/build/outputs/mapping/liteRelease/mapping.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.date_today }} - ${{ env.repository_name }} - ${{ inputs.name }}
          path: app/build/upload/

      # Delete existing nightly release
      - name: Delete existing nightly release
        if: ${{ inputs.minify && inputs.nightly_release }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tagName = 'nightly';

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            for (const release of releases.filter(r => r.tag_name === tagName)) {
              core.info(`Deleting nightly release ${release.id} (${release.name || release.tag_name})`);
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.id,
              });
            }

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `tags/${tagName}`,
              });
              core.info(`Deleted tag ${tagName}`);
            } catch (error) {
              if (error.status === 404) {
                core.info(`Tag ${tagName} does not exist`);
              } else {
                throw error;
              }
            }

      # Generate nightly changelog
      - name: Generate nightly changelog
        if: ${{ inputs.minify && inputs.nightly_release }}
        id: nightly_changelog
        uses: actions/github-script@v7
        with:
          script: |
            const { data: tags } = await github.rest.repos.listTags({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            // Find the latest non-nightly tag
            const lastReleaseTag = tags.find(t => t.name !== 'nightly');
            let since;
            if (lastReleaseTag) {
              const { data: tagCommit } = await github.rest.repos.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: lastReleaseTag.commit.sha,
              });
              since = tagCommit.commit.committer.date;
            } else {
              // Fallback: 24 hours ago
              since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
            }

            const { data: commits } = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              since: since,
              per_page: 50,
            });

            if (commits.length === 0) {
              return 'No changes since last release.';
            }

            const lines = [];
            for (const c of commits) {
              const msg = c.commit.message.split('\n')[0];
              const sha = c.sha.substring(0, 7);
              lines.push(`- ${msg} (${sha})`);
            }

            if (lastReleaseTag) {
              return `**Changes since ${lastReleaseTag.name}:**\n\n` + lines.join('\n');
            } else {
              return `**Recent changes:**\n\n` + lines.join('\n');
            }
          result-encoding: string

      # Create new nightly release
      - name: Create Nightly Release
        if: ${{ inputs.minify && inputs.nightly_release }}
        id: nightly_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build (${{ env.date_today }})
          body: |
            Nightly build generated on ${{ env.date_today }}

            ${{ steps.nightly_changelog.outputs.result }}
          files: |
            app/build/upload/zhihu++-lite.apk
            app/build/upload/mapping-lite.zip
            app/build/upload/zhihu++-full.apk
            app/build/upload/zhihu++-desktop-*.jar
          fail_on_unmatched_files: true
          prerelease: true
      - name: Generate release notes
        if: ${{ inputs.release && startsWith(github.ref, 'refs/tags/') }}
        id: release_notes
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
            });
            console.log(data.body);
            return data.body;
          result-encoding: string

      - name: Create Release
        if: ${{ inputs.release && startsWith(github.ref, 'refs/tags/') }}
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            如果要使用，请下载最新的 APK 文件进行安装。不需要下载 mapping.zip，除非你是开发人员且需要调试混淆后的代码。
            Full 版本包含 AI 功能和 AI 模型，可处理NLP任务；Lite 版本体积更小，只有不到 4 MB 的大小。

            > 关于Full和Lite两个版本的说明：
            > Full版本包含了一个onnx框架，可以在端侧进行离线AI推理，支持基于LLM embedding的智能内容过滤功能，
            > 这实际上主要是本人对端侧AI的技术尝试，实际功能还有很多没开发的，比如人本地知识库（懒）；
            > Lite版本不支持智能内容过滤，但体积更小，性能更好。您可以根据自己的需求选择下载哪个版本。

            ${{ steps.release_notes.outputs.result }}
          files: |
            app/build/upload/zhihu++-lite.apk
            app/build/upload/mapping-lite.zip
            app/build/upload/zhihu++-full.apk
            app/build/upload/zhihu++-desktop-*.jar
          fail_on_unmatched_files: true
          prerelease: false

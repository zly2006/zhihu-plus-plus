name: Export Keystore (Temporary)

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Export keystore
        run: |
          echo "${{ secrets.ANDROID_SIGNING_KEY }}" | base64 -d > zhihu.jks
          ls -la zhihu.jks
      - name: Upload keystore as artifact
        uses: actions/upload-artifact@v4
        with:
          name: zhihu-keystore
          path: zhihu.jks
